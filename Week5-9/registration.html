<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration Form</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <script>
        function showAlert() {
            document.getElementById("successMsg").style.display = "block";
        }
    </script>
</head>

<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">Student Registration Form</h2>

    <div class="row justify-content-center">
        <div class="col-md-8">

            
            <div id="successMsg" class="alert alert-success" style="display:none;">
                Form submitted successfully!
            </div>

            <form onsubmit="showAlert(); return false;">

                
                <div class="mb-3">
                    <label class="form-label">Student Name</label>
                    <input type="text" class="form-control" placeholder="Enter name" required>
                </div>

                
                <div class="mb-3">
                    <label class="form-label">Roll Number</label>
                    <input type="text" class="form-control" placeholder="Enter roll number" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" placeholder="Enter email" required>
                </div>

                
                <div class="mb-3">
                    <label class="form-label">Gender</label><br>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="gender">
                        <label class="form-check-label">Male</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="gender">                       <label class="form-check-label">Female</label>
                    </div>
                </div>

                
                <div class="mb-3">
                    <label class="form-label">Department</label>
                    <select class="form-select">
                        <option selected>Select Department</option>
                        <option>CSE</option>
                        <option>ECE</option>
                        <option>EEE</option>
                        <option>MECH</option>
                    </select>
                </div>

                
                <div class="mb-3">
                    <label class="form-label">Subjects</label><br>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox">
                        <label class="form-check-label">DBMS</label>
                    </div>
                    <div class="form-check">
                            <input class="form-check-input" type="checkbox">
                        <label class="form-check-label">OS</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox">
                        <label class="form-check-label">CN</label>
                    </div>
                </div>

                
                <div class="mb-3">
                    <label class="form-label">Upload Photo</label>
                    <input type="file" class="form-control">
                </div>

                
                <div class="text-center">
                    <button type="submit" class="btn btn-primary me-2">Submit</button>
                    <button type="reset" class="btn btn-secondary">Reset</button>
                </div>

            </form>

        </div>
    </div>
</div>

</body>
</html>
