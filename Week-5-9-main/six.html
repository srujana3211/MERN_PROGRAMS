<html>
    <head>
        <title>table</title>
        <style> 
     table,th,td 
    {
        border:1px solid black;
        border-collapse:collapse;
        border-style: dotted;
    }
    td{
        text-align:center;
    }
    </style>
    </head>
    
    <body>
        <table>
            <tr>
                <th>Sub Name</th>
                <th>Marks</th>
            </tr>
            <tr>
                <td>Telugu</td>
                <td>98</td>
            </tr>
             <tr>
                <td>Hindi</td>
                <td>90</td>
            </tr>
             <tr>
                <td>English</td>
                <td>97</td>
            </tr>

        </table>
    </body>
</html>
