<!DOCTYPE html>
<html>

<head>
    <title>Feedback Form</title>
    <link rel="stylesheet" href="style3.css">
</head>

<body>
    <h2>Feedback Form</h2>
<div class="m_container">
    <form>
        <div class="group"></div>
        <label>Name:</label>
        <input type="text"><br>
        </div>
        <div class="group"></div>
        <label>Email:</label>
        <input type="email"><br>
        </div>
        <div class="group"></div>
        <label>Feedback:</label>
        <textarea rows="4" cols="30"></textarea><br>
        </div>
        <div class="group"></div>
        <label>How satisfied are you?</label>
        <input type="radio" name="satisfaction"> Satisfied
        <input type="radio" name="satisfaction"> Neutral
        <input type="radio" name="satisfaction"> Unsatisfied<br>
        </div>
        <div class="group">
            <button type="submit">Submit</button>
        </div>
    </form>
    </div>
</body>

</html>
