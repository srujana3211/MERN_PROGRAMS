<!DOCTYPE html>
<html>
    <head>
        <title> Simple web page layout </title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>

    <header>
        <h1>Header Section</h1>
    </header>

    <div class="container">

        <aside class="sidebar">
            <h2>Sidebar</h2>
            <p>Navigation links or extra content goes here.</p>
        </aside>

        <main class="main-content">
            <h2>Main Content</h2>
            <p>This is the main area of the webpage where the primary content is displayed.</p>
        </main>

    </div>

    <footer>
        <p>Footer Section</p>
    </footer>

</body>
</html>
