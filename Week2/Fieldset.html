<!DOCTYPE html>
<html>
    <head>
        <title> Using Fieldset and Legend </title>
    </head>
    <body>
    <center>
        <h1> User Details: </h1>
        <form>
            <fieldset style = "width: 100px;">
                <legend align="center"> User Info </legend>
                <label for id="n"> Name:</label>
                <input type = "text" placeholder = "Enter your name" id = "n">
                <br> 
                <br>
                <label for id="em"> E-mail:</label>
                <input type = "email" placeholder = "Enter your email" id = "em">
                <br> 
                <br>
                <label for id = "pn"> Phone No:</label>
                <input type ="number" placeholder = "Enter your phone number" id = "pn">
                <br>
                <br>
                <input type = "submit" value = "submit">
            </fieldset>
        </form>
    </center>  
    </body>
</html>
